version: "3.9"

services:
  backend:
    build: ./backend
    container_name: sci2email-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: sci2email-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
